    <title>Tesla Prime AI Investment Broker V4.2</title>
    <script>
      window.onerror = function(message) {
        if (message === 'Script error.') {
          return true;
        }
        return false;
      };
      window.addEventListener('error', function(event) {
        if (event.message === 'Script error.') {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true); // Use capture phase to intercept before others
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
